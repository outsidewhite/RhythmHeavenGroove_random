<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>リズム天国ミラクルスターズ ランダムパーフェクトチャレンジ</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="play-area" aria-label="リズムゲーム抽選">
        <div class="status-bar">
          <div>
            <p class="label">レンチャン</p>
            <p class="streak"><span id="streakCount">0</span><span>連</span></p>
          </div>
          <div class="pool-meter" aria-live="polite">
            <p class="label" id="poolLabel">未抽選</p>
            <p class="pool-count"><span id="poolCount">80</span><span>/80</span></p>
          </div>
        </div>

        <div class="game-stage" id="gameStage">
          <div class="image-frame">
            <img id="gameImage" alt="" title="表/裏モード切り替え" />
            <div class="placeholder" id="placeholder">READY</div>
          </div>
          <p class="stage-code" id="stageCode">--</p>
          <h1 class="game-name" id="gameName">抽選開始でスタート</h1>
        </div>

        <div class="controls">
          <button class="primary-button" id="mainButton" type="button">抽選開始</button>
          <button class="stop-button" id="stopButton" type="button" disabled>ストップ</button>
          <button class="reset-button" id="resetButton" type="button">やりなおし</button>
        </div>
      </section>

      <aside class="history-panel" aria-label="パーフェクト履歴">
        <div class="history-header">
          <p class="label">PERFECT LIST</p>
          <h2>パーフェクトしたゲーム</h2>
        </div>
        <ol class="history-list" id="historyList"></ol>
        <p class="empty-history" id="emptyHistory">まだ記録はありません</p>
      </aside>
    </main>

    <!-- 免責事項をサイト最下部に表示します。 -->
    <footer class="site-footer">
      当サイトは個人が公開しているwebサービスであり、リズム天国ミラクルスターズならび、任天堂株式会社や関連企業様とは一切関係ありません。
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
